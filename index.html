<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <title>OpenBALC - Open Source Courses Management & AI Learning Platform</title>
    <meta name="description" content="OpenBALC is an open source study, course management, and AI workspace platform. Build custom study modules from PDFs, documents, or URLs, take AI-generated practice tests, and chat with your materials." />
    <meta name="keywords" content="OpenBALC, course management, AI learning, hybrid RAG, study assistant, custom study modules, active recall quizzes, interactive mindmap" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://openbalc.com" />
    
    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://openbalc.com" />
    <meta property="og:title" content="OpenBALC - Open Source Courses Management & AI Learning Platform" />
    <meta property="og:description" content="OpenBALC is an open source study, course management, and AI workspace platform. Build custom study modules from PDFs, documents, or URLs, take AI-generated practice tests, and chat with your materials." />
    <meta property="og:image" content="https://openbalc.com/og-image.png" />
    <meta property="og:site_name" content="OpenBALC" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://openbalc.com" />
    <meta name="twitter:title" content="OpenBALC - Open Source Courses Management & AI Learning Platform" />
    <meta name="twitter:description" content="OpenBALC is an open source study, course management, and AI workspace platform. Build custom study modules from PDFs, documents, or URLs, take AI-generated practice tests, and chat with your materials." />
    <meta name="twitter:image" content="https://openbalc.com/og-image.png" />
    
    <!-- JSON-LD Structured Data Schema Markup (GEO & SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "OpenBALC",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "All",
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "USD",
          "lowPrice": "0.00",
          "highPrice": "25.00",
          "offerCount": "3"
        },
        "description": "OpenBALC is an open source study workspace and course management platform powered by AI. Users can build structured modules from text files, PDFs, and website links, and leverage hybrid RAG models for active learning, interactive tests, and conceptual mapping.",
        "url": "https://openbalc.com",
        "featureList": [
          "Intelligent custom study modules from documents or URLs",
          "Active recall quizzes and practice tests generated by AI",
          "Contextual study assistant and multi-modal chat with sources",
          "Collaborative study workspaces for students and organizations",
          "Interactive mindmaps and visual concept trees",
          "Credit-based resource economy and community modules library"
        ],
        "creator": {
          "@type": "Organization",
          "name": "OpenBALC Community",
          "url": "https://openbalc.com"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OpenBALC",
        "url": "https://openbalc.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://openbalc.com/modules?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
