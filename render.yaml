services:
  - type: web
    name: calendarsync-benchrex-frontend
    plan: free
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: API_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.19.0
    routes:
      - type: rewrite
        source: /api/*
        destination: https://calendarsync-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
